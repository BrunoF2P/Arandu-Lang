name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # DiagCode enum ↔ docs/errors/*.md (single source of truth; not build.rs list).
  diag-docs:
    name: Diag docs (DiagCode bijection)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: check-diag-docs
        run: bash scripts/check-diag-docs.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace

  # RFC A1: diagnostic/test output independent of harness parallelism.
  diag-determinism:
    name: Diag determinism (test-threads 1 vs N)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: typeck lib 1 vs 8 threads
        run: bash scripts/check-diag-determinism.sh arandu_typeck 8
      - name: semantics type_checker tests 1 vs 8 threads
        run: |
          set -euo pipefail
          # Integration tests that emit type diagnostics.
          # Normalize like scripts/check-diag-determinism.sh: strip ANSI
          # (CARGO_TERM_COLOR=always) and collapse "finished in Xs" timing noise.
          TMP=$(mktemp -d)
          trap 'rm -rf "$TMP"' EXIT
          set +e
          cargo test -p arandu_semantics --test type_checker -- --test-threads=1 --quiet >"$TMP/a" 2>&1
          EC1=$?
          cargo test -p arandu_semantics --test type_checker -- --test-threads=8 --quiet >"$TMP/b" 2>&1
          ECN=$?
          set -e
          if [[ "$EC1" -ne 0 || "$ECN" -ne 0 ]]; then
            echo "error: type_checker failed (threads=1 exit=$EC1, threads=8 exit=$ECN)" >&2
            tail -40 "$TMP/a" >&2 || true
            tail -40 "$TMP/b" >&2 || true
            exit 1
          fi
          norm() {
            sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' "$1" \
              | grep -E '^(test result:|error\[|error:)' \
              | sed -E \
                -e 's/test result: ok\..*/test result: ok./' \
                -e 's/test result: FAILED\..*/test result: FAILED./' \
              | sort -u
          }
          diff -u <(norm "$TMP/a") <(norm "$TMP/b")
          echo "semantics type_checker: ok (threads 1 vs 8)"

  # Camada D: current_exe/symlink resolution differs Linux vs macOS — run early,
  # not only at release day.
  install-smoke:
    name: Install smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Smoke versioned install + PATH symlink doctor
        run: |
          unset ARANDU_STDLIB
          bash scripts/smoke-install.sh
      - name: Package tarball + BLAKE3 + reinstall from archive
        run: |
          set -euo pipefail
          unset ARANDU_STDLIB
          bash scripts/package-release.sh
          TAR=$(ls dist/arandu-*.tar.gz | head -1)
          test -f "${TAR}.blake3"
          PREFIX=$(mktemp -d)
          PREFIX="$PREFIX" bash scripts/install-from-tarball.sh "$TAR"
          env -u ARANDU_STDLIB PATH="$PREFIX/bin:/usr/bin:/bin" \
            bash -c 'cd /tmp && exec "$0" doctor' "$PREFIX/bin/arandu"
          echo deadbeef > "${TAR}.blake3"
          if PREFIX=$(mktemp -d) bash scripts/install-from-tarball.sh "$TAR"; then
            echo "expected blake3 mismatch to abort" >&2
            exit 1
          fi
