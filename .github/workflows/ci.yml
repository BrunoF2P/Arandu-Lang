name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests with diagnostic doc validation
        run: cargo test --workspace
        env:
          ARANDU_VALIDATE_DOCS: "1"

  # Isolated install smoke: no ARANDU_STDLIB, no monorepo on PATH, symlink PATH.
  # Proves Camada D (current_exe canonicalize → share/arandu/stdlib).
  install-smoke:
    name: Install smoke (isolated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Smoke versioned install + PATH symlink doctor
        run: |
          unset ARANDU_STDLIB
          ./scripts/smoke-install.sh
      - name: Package tarball + BLAKE3 + reinstall from archive
        run: |
          set -euo pipefail
          unset ARANDU_STDLIB
          ./scripts/package-release.sh
          TAR=$(ls dist/arandu-*.tar.gz | head -1)
          test -f "${TAR}.blake3"
          PREFIX=$(mktemp -d)
          PREFIX="$PREFIX" ./scripts/install-from-tarball.sh "$TAR"
          env -u ARANDU_STDLIB PATH="$PREFIX/bin:/usr/bin:/bin" \
            bash -c 'cd /tmp && exec "$0" doctor' "$PREFIX/bin/arandu"
          # Corrupt checksum must fail closed.
          echo deadbeef > "${TAR}.blake3"
          if PREFIX=$(mktemp -d) ./scripts/install-from-tarball.sh "$TAR"; then
            echo "expected blake3 mismatch to abort" >&2
            exit 1
          fi
